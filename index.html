<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Engine">
    <meta name="theme-color" content="#0a0a0f">
    <title>Daily Engine</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
    <link rel="stylesheet" href="styles_v10.css">
    <!-- Firebase SDK (CDN, compat mode for vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
    <!-- ===== TOP NAV BAR ===== -->
    <header id="app-header">
        <div class="header-left">
            <span class="app-logo">⚡</span>
            <h1>Daily Engine</h1>
            <span id="sync-indicator" class="sync-indicator"></span>
        </div>
        <div class="header-right">
            <button id="btn-today" class="nav-btn active" aria-label="Today view">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </button>
            <button id="btn-edit" class="nav-btn" aria-label="Edit schedule">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button id="btn-stats" class="nav-btn" aria-label="Calendar & history">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14.01"/><line x1="12" y1="14" x2="12" y2="14.01"/><line x1="16" y1="14" x2="16" y2="14.01"/></svg>
            </button>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="app-main">

        <!-- TODAY VIEW -->
        <section id="view-today" class="view active">
            <div class="today-header">
                <h2 id="today-date"></h2>
                <div id="time-block-pills" class="pill-row"></div>
            </div>
            <div id="today-checklist" class="checklist-container"></div>
            <div id="today-todos" class="todo-section"></div>
            <div id="today-scheduled" class="scheduled-section"></div>
            <div id="today-progress" class="progress-bar-container">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <span id="progress-label" class="progress-label">0 / 0</span>
            </div>
        </section>

        <!-- EDIT VIEW -->
        <section id="view-edit" class="view">
            <div class="edit-header">
                <h2>Edit</h2>
                <p class="edit-subtitle">Manage your time blocks &amp; task library</p>
            </div>
            <div id="edit-content"></div>
        </section>

        <!-- CALENDAR & HISTORY VIEW -->
        <section id="view-stats" class="view">
            <div class="stats-header">
                <h2>Calendar</h2>
            </div>
            <div id="stats-content" class="stats-content"></div>
        </section>
    </main>

    <script src="app_v10.js"></script>
</body>
</html>
